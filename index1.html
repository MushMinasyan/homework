    <script>
      function sumAll(array) {
        let max = Math.max(...array);
        let min = Math.min(...array);
        for (let i = min; i < max; i++) {
          if (!array.includes(i)) {
            array.push(i);
          }
        }
        return array.reduce((a, b) => a + b, 0);
      }
      console.log(sumAll([1, 4]));
      console.log(sumAll([4, 1]));
      console.log(sumAll([5, 10]));
    </script>
